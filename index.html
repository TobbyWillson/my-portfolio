<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/images/tobby-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tobby Willson | Portfolio</title>
    <meta name="description" content="This is the official portfolio of Tobby Willson, a frontend developer based in Nigeria. Showcasing his amazing skills in various frontend tools and also his past projects." />
    <script>
      (function () {
        try {
          const saved = localStorage.getItem("theme");
          const supportDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

          if (saved === "dark" || (!saved && supportDark)) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
